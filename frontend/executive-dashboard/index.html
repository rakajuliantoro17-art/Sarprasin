<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Executive Monitoring</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* ===== GLOBAL ===== */
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
  background: linear-gradient(135deg,#5ee7df,#3a8dde);
  color:white;
}

.container{
  max-width:1200px;
  margin:auto;
  padding:20px;
}

/* ===== HEADER ===== */
.header{
  text-align:center;
  margin-bottom:25px;
}

.logo{
  width:70px;
  margin-bottom:10px;
}

h1{
  margin:0;
  font-size:22px;
  font-weight:600;
}

/* ===== KPI ===== */
.kpi-container{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:15px;
  margin-bottom:25px;
}

.card{
  backdrop-filter: blur(18px);
  background: rgba(255,255,255,0.15);
  border-radius:20px;
  padding:18px;
  box-shadow:0 8px 30px rgba(0,0,0,0.15);
  transition:0.3s;
}

.card:hover{
  transform:translateY(-3px);
}

.kpi-title{
  font-size:13px;
  opacity:0.9;
}

.kpi-number{
  font-size:22px;
  font-weight:700;
  margin-top:5px;
}

/* ===== GRID ===== */
.content-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}

@media(max-width:900px){
  .content-grid{
    grid-template-columns:1fr;
  }
}

/* ===== FILTER ===== */
select{
  padding:8px;
  border-radius:12px;
  border:none;
  margin-bottom:10px;
  font-size:13px;
  width:100%;
}

/* ===== TABLE ===== */
.table-wrapper{
  overflow:auto;
  max-height:350px;
  border-radius:12px;
}

table{
  width:100%;
  border-collapse:collapse;
  font-size:13px;
}

th,td{
  padding:10px;
  border-bottom:1px solid rgba(255,255,255,0.2);
}

th{
  position:sticky;
  top:0;
  background:rgba(0,0,0,0.25);
}

td{
  background:rgba(255,255,255,0.05);
}

/* ===== CHART ===== */
canvas{
  max-height:280px;
}

/* ===== EMPTY ===== */
.empty{
  text-align:center;
  opacity:0.8;
  padding:20px;
}

</style>
</head>

<body>

<div class="container">

  <!-- HEADER -->
  <div class="header">
    <img src="https://sman1sooko.sch.id/media_library/images/397a98c4618261af0d970851901f2b5b.png" class="logo">
    <h1>Sooko Smart Inventory Monitoring</h1>
  </div>

  <!-- KPI -->
  <div class="kpi-container">
    <div class="card"><div class="kpi-title">Total Aset</div><div class="kpi-number" id="totalAset">-</div></div>
    <div class="card"><div class="kpi-title">Kondisi Baik</div><div class="kpi-number" id="baik">-</div></div>
    <div class="card"><div class="kpi-title">Perlu Perbaikan</div><div class="kpi-number" id="perbaikan">-</div></div>
    <div class="card"><div class="kpi-title">Rusak Berat</div><div class="kpi-number" id="rusak">-</div></div>
    <div class="card"><div class="kpi-title">Total Nilai Aset</div><div class="kpi-number" id="totalNilai">-</div></div>
  </div>

  <!-- CONTENT -->
  <div class="content-grid">

    <!-- CHART -->
    <div class="card">
      <h3>Persentase Kondisi Aset</h3>
      <canvas id="pieChart"></canvas>
    </div>

    <!-- TABLE -->
    <div class="card">
      <h3>Daftar Aset</h3>
      <select id="filterLokasi"></select>

      <div class="table-wrapper">
        <table id="assetTable">
          <thead>
            <tr>
              <th>Nama</th>
              <th>Lokasi</th>
              <th>Status</th>
              <th>Nilai</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
        <div id="emptyState" class="empty" style="display:none;">
          Tidak ada data
        </div>
      </div>
    </div>

  </div>

</div>

<script>

let allAssets = [];
let chartInstance = null;

function formatRupiah(angka){
  return "Rp " + (angka || 0).toLocaleString("id-ID");
}

function loadDashboard(){
  google.script.run.withSuccessHandler(data => {

    if(!data || !data.success){
      alert("Data tidak ditemukan");
      return;
    }

    document.getElementById("totalAset").innerText = data.total;
    document.getElementById("baik").innerText = data.baik;
    document.getElementById("perbaikan").innerText = data.perbaikan;
    document.getElementById("rusak").innerText = data.rusak;
    document.getElementById("totalNilai").innerText = formatRupiah(data.totalNilai);

    allAssets = data.assets || [];

    renderPie(data.baik, data.perbaikan, data.rusak);
    renderFilter(data.lokasiList || []);
    renderTable(allAssets);

  }).getExecutiveDashboard();
}

function renderPie(baik, perbaikan, rusak){
  const ctx = document.getElementById('pieChart');

  if(chartInstance){
    chartInstance.destroy();
  }

  chartInstance = new Chart(ctx,{
    type:'pie',
    data:{
      labels:['Baik','Perbaikan','Rusak'],
      datasets:[{
        data:[baik, perbaikan, rusak],
        backgroundColor:['#4cd964','#ffcc00','#ff3b30']
      }]
    },
    options:{
      responsive:true,
      plugins:{
        legend:{labels:{color:"white"}}
      }
    }
  });
}

function renderFilter(lokasiList){
  const select = document.getElementById("filterLokasi");
  select.innerHTML = "<option value=''>Semua Lokasi</option>";

  lokasiList.forEach(lok=>{
    select.innerHTML += `<option value="${lok}">${lok}</option>`;
  });

  select.onchange = function(){
    const val = this.value;
    const filtered = val ? allAssets.filter(a=>a.lokasi===val) : allAssets;
    renderTable(filtered);
  };
}

function renderTable(data){
  const tbody = document.querySelector("#assetTable tbody");
  const empty = document.getElementById("emptyState");

  tbody.innerHTML = "";

  if(data.length === 0){
    empty.style.display="block";
    return;
  }else{
    empty.style.display="none";
  }

  data.forEach(a=>{
    tbody.innerHTML += `
      <tr>
        <td>${a.nama}</td>
        <td>${a.lokasi}</td>
        <td>${a.status}</td>
        <td>${formatRupiah(a.nilai)}</td>
      </tr>
    `;
  });
}

loadDashboard();

</script>

</body>
</html>
