<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Publik EJIES</title>

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <!-- Chart -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">

    <!-- LOGO -->
    <div class="logo">
      <img src="https://sman1sooko.sch.id/media_library/images/397a98c4618261af0d970851901f2b5b.png">
    </div>

    <!-- TITLE -->
    <h1 class="title">Dashboard Publik EJIES</h1>
    <p class="subtitle" id="updateTime">Loading...</p>

    <!-- KPI -->
    <div class="glass">
      <div class="kpi-grid">

        <div class="kpi-card">
          <div class="kpi-label">Total Aset</div>
          <div class="kpi-value" id="total">0</div>
        </div>

        <div class="kpi-card">
          <div class="kpi-label">Baik</div>
          <div class="kpi-value" id="baik">0</div>
        </div>

        <div class="kpi-card">
          <div class="kpi-label">Perbaikan</div>
          <div class="kpi-value" id="perbaikan">0</div>
        </div>

        <div class="kpi-card">
          <div class="kpi-label">Rusak</div>
          <div class="kpi-value" id="rusak">0</div>
        </div>

      </div>
    </div>

    <!-- PROGRESS -->
    <div class="glass">
      <h3>Indeks Kelayakan Sarpras</h3>

      <div class="progress-bar">
        <div id="progressFill" class="progress-fill">0%</div>
      </div>

      <p id="statusText" class="status"></p>
    </div>

    <!-- CHART -->
    <div class="glass">
      <h3>Distribusi Kondisi Aset</h3>
      <canvas id="chart"></canvas>
    </div>

    <!-- FOOTER -->
    <div class="footer">
      © 2026 SMAN 1 Sooko - Transparansi Digital
    </div>

  </div>

  <!-- JS -->
  <script src="app.js"></script>

</body>
</html>
